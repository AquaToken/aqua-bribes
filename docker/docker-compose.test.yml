services:
  db:
    image: postgres:alpine
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: test

  backend:
    build:
      context: ..
      dockerfile: ./docker/Dockerfile
      args:
        REQUIREMENTS_FILE: "dev.txt"
    depends_on:
      - db
    command: bash -c "/code/scripts/wait-for-it.sh db:5432 -t 60 && . /code/scripts/runtests.sh"
    environment:
      DATABASE_URL: "postgres://test:test@db/test"
      DJANGO_SETTINGS_MODULE: "config.settings.dev"
